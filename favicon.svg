<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Breathe">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%"  stop-color="#f7f3e9"/>
      <stop offset="100%" stop-color="#e8e5da"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#a8c69a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6fa86f" stop-opacity="0.35"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>
  <!-- subtle monstera leaf shape behind the letter -->
  <path d="M 38 200 Q 60 120 130 70 Q 200 30 232 60 Q 240 140 175 200 Q 110 240 38 200 Z" fill="url(#leaf)" opacity="0.45"/>
  <!-- The 'B' in Cormorant-style serif -->
  <text x="128" y="186" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, Georgia, serif"
        font-weight="400" font-size="200" fill="#1a1a1a"
        letter-spacing="0">B</text>
</svg>
